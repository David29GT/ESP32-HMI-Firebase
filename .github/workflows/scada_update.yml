name: Actualización Automática SCADA - 3 Tanques

on:
  schedule:
    # Se ejecuta automáticamente cada 5 minutos (formato Cron)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde GitHub con un botón si quieres probar

jobs:
  procesar-telemetria:
    runs-on: ubuntu-latest

    steps:
    # 1. Clona el repositorio actual en el servidor virtual
    - name: Clonar repositorio
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python 3.13
    - name: Configurar Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # 3. Instala las dependencias necesarias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # 4. Ejecuta tu script main.py pasándole las credenciales seguras
    - name: Ejecutar procesamiento de datos SCADA
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
      run: |
        python backend/main.py

    # 5. Guarda el historial de SQLite y el JSON generado en el repositorio
    - name: Guardar cambios en el repositorio
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        # Agregamos la DB y el JSON de la gráfica
        git add backend/historico_scada.db backend/datos_grafica.json
        # Solo hacemos commit si hay cambios reales para evitar errores
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatización: Sincronización de telemetría" && git push)